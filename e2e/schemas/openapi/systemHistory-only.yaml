    feature:
      $schema: https://json-schema.org/draft/2020-12/schema
      allOf:
        - $ref: '#/components/schemas/Feature'
        - type: object
          properties:
            id:
              description: Local ID of the feature (ignored on create or update)
              minLength: 1
            geometry:
              description: Geometry of the feature
            bbox:
              description: Optional bounding box for the feature
            properties:
              description: Feature properties
              type: object
              required:
                - featureType
                - uid
                - name
              properties:
                featureType:
                  description: Identifier of the type of feature, either a URI, a CURIE, or a simple token
                  type: string
                uid:
                  description: Globally unique identifier of the feature
                  type: string
                  format: uri
                  example: urn:x-org:namespace:id
                name:
                  description: Human readable name of the feature
                  type: string
                  minLength: 1
                description:
                  description: Human readable description of the feature
                  type: string
                  minLength: 1
            links:
              description: Links to related resources
              $ref: '#/components/schemas/links'
    SystemTypeUris:
      type: string
      enum:
        - http://www.w3.org/ns/sosa/Sensor
        - http://www.w3.org/ns/sosa/Actuator
        - http://www.w3.org/ns/sosa/Platform
        - http://www.w3.org/ns/sosa/Sampler
        - http://www.w3.org/ns/sosa/System
        - sosa:Sensor
        - sosa:Actuator
        - sosa:Platform
        - sosa:Sampler
        - sosa:System
    system:
      $schema: https://json-schema.org/draft/2020-12/schema
      allOf:
        - $ref: '#/components/schemas/feature'
        - properties:
            properties:
              properties:
                featureType:
                  $ref: '#/components/schemas/SystemTypeUris'
                assetType:
                  description: Type of asset represented by this system.
                  type: string
                  enum:
                    - Equipment
                    - Human
                    - LivingThing
                    - Simulation
                    - Process
                    - Group
                    - Other
                validTime:
                  description: Time period during which the system description is valid.
                  $ref: '#/components/schemas/timePeriod'
                systemKind@link:
                  description: Link to the system kind description (i.e., its nature or specifications).
                  $ref: '#/components/schemas/link'
    systemArray:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: array
      items:
        title: System Feature
        $ref: '#/components/schemas/system'
    systemCollection:
      $schema: https://json-schema.org/draft/2020-12/schema
      allOf:
        - $ref: '#/components/schemas/FeatureCollection'
        - type: object
          properties:
            features:
              $ref: '#/components/schemas/systemArray'
            links:
              description: Links to related resources (including paging)
              $ref: '#/components/schemas/links'
    ObservableProperty:
      description: A physical property that can be observed and possibly measured (e.g., temperature, color, position). An ObservableProperty has unambiguous definition, but does not have units of measure.
      type: object
      allOf:
        - $ref: '#/components/schemas/AbstractSweIdentifiable'
        - properties:
            type:
              const: ObservableProperty
            definition:
              type: string
              format: uri
          required:
            - type
            - definition
    IOComponentChoice:
      oneOf:
        - title: DataComponent
          allOf:
            - $ref: '#/components/schemas/SoftNamedProperty'
            - $ref: '#/components/schemas/AnyComponent'
        - title: ObservableProperty
          allOf:
            - $ref: '#/components/schemas/SoftNamedProperty'
            - $ref: '#/components/schemas/ObservableProperty'
    CodeListValue:
      type: object
      properties:
