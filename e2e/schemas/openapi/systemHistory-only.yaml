      in: path
      description: Local identifier of a Control Stream
      required: true
      schema:
        type: string
        minLength: 1
    cmdFormat:
      name: cmdFormat
      in: query
      description: Media type of the desired command format
      required: false
      schema:
        type: string
    statusCodeList:
