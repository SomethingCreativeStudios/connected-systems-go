        ParameterList:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/IOComponentChoice'
        ModeChoice:
          type: object
          properties:
            modes:
              type: array
              minItems: 1
              items:
                $ref: '#/components/schemas/Mode'
        IOComponentChoice:
          oneOf:
            - title: DataComponent
              allOf:
                - $ref: '#/components/schemas/SoftNamedProperty'
                - $ref: '#/components/schemas/AnyComponent'
            - title: ObservableProperty
              allOf:
                - $ref: '#/components/schemas/SoftNamedProperty'
                - $ref: '#/components/schemas/ObservableProperty'
    ProcessMethod:
      type: object
      properties:
        algorithm:
          title: A description of the algorithm using a machine readable language, either inline or by reference
        description:
          title: A description of the method in natural language
          type: string
    SimpleProcess:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      allOf:
        - $ref: '#/components/schemas/AbstractProcess'
        - properties:
            type:
              const: SimpleProcess
            method:
              $ref: '#/components/schemas/ProcessMethod'
      $defs:
        ProcessMethod:
          type: object
          properties:
            algorithm:
              title: A description of the algorithm using a machine readable language, either inline or by reference
            description:
              title: A description of the method in natural language
              type: string
    AggregateProcess:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      allOf:
        - $ref: '#/components/schemas/AbstractProcess'
        - properties:
            type:
              const: AggregateProcess
            components:
              description: The list of sub-processes
              $ref: '#/components/schemas/ComponentList'
            connections:
              description: The explicit definition of data links between outputs, inputs, and parameters of the components within an aggregate process.
              $ref: '#/components/schemas/ConnectionList'
      $defs:
        ComponentList:
          type: array
          minItems: 1
          items:
            allOf:
              - $ref: '#/components/schemas/SoftNamedProperty'
              - oneOf:
                  - $ref: '#/components/schemas/SimpleProcess'
                  - $ref: '#/components/schemas/AggregateProcess'
                  - $ref: '#/components/schemas/PhysicalComponent'
                  - $ref: '#/components/schemas/PhysicalSystem'
                  - $ref: '#/components/schemas/link'
                    properties:
                      type:
                        const: Link
        ConnectionList:
          type: array
          minItems: 1
          items:
            type: object
            properties:
              source:
                $ref: '#/components/schemas/PathRef'
              destination:
                $ref: '#/components/schemas/PathRef'
            required:
              - source
              - destination
    Point:
      $schema: http://json-schema.org/draft-07/schema#
      $id: https://geojson.org/schema/Point.json
      title: GeoJSON Point
      type: object
      required:
        - type
        - coordinates
      properties:
        type:
          type: string
          enum:
            - Point
        coordinates:
          type: array
          minItems: 2
          items:
            type: number
        bbox:
          type: array
          minItems: 4
          items:
            type: number
    PositionGeo:
      description: Geographic position in EPSG:4979 CRS (WGS84)
      properties:
        lat:
          type: number
        lon:
          type: number
        h:
          type: number
      required:
        - lat
        - lon
        - h
    AnglesYPR:
      description: Euler angles, with yaw, pitch and roll rotations about the local (rotated) axes Z, Y, and X respectively, applied in that order
      properties:
        yaw:
          description: Yaw angle about Z axis, in degrees
          type: number
        pitch:
          description: Pitch angle about Y axis, in degrees
          type: number
        roll:
          description: Roll angle about X axis, in degrees
          type: number
      required:
        - yaw
        - pitch
        - roll
    Quaternion:
      description: Quaternion orientation expressed in the specified reference frame
      properties:
        x:
          type: number
        'y':
          type: number
        z:
          type: number
        w:
          type: number
      required:
        - x
        - 'y'
        - z
        - w
    PositionXYZ:
      description: Cartesian position expressed in the specified reference frame
      properties:
        x:
          description: Distance along the X axis, in meters
          type: number
        'y':
          description: Distance along the Y axis, in meters
          type: number
        z:
          description: Distance along the Z axis, in meters
          type: number
      required:
        - x
        - 'y'
        - z
    Pose:
      $schema: https://json-schema.org/draft/2020-12/schema
      description: A Pose object that can be either a GeoPose Basic instance of a relative pose.
      oneOf:
        - type: object
          title: GeoPose YPR
          description: 'Basic-YPR: Basic GeoPose using yaw, pitch, and roll to specify orientation'
          properties:
            type:
              const: GeoPose
            ltpReferenceFrame:
              type: string
              format: uri
            position:
              $ref: '#/components/schemas/PositionGeo'
            angles:
              $ref: '#/components/schemas/AnglesYPR'
          required:
            - type
            - position
            - angles
        - type: object
          title: GeoPose Quaternion
          description: 'Basic-Quaternion: Basic GeoPose using quaternion to specify orientation'
          properties:
            type:
              const: GeoPose
            ltpReferenceFrame:
              type: string
              format: uri
            position:
              $ref: '#/components/schemas/PositionGeo'
            quaternion:
              $ref: '#/components/schemas/Quaternion'
          required:
            - type
            - position
            - quaternion
        - type: object
          title: Relative Pose YPR
          description: 'Relative-YPR: Relative pose using yaw, pitch, and roll to specify orientation'
          properties:
            type:
              const: RelativePose
            referenceFrame:
              type: string
              format: uri
            position:
              $ref: '#/components/schemas/PositionXYZ'
            angles:
              $ref: '#/components/schemas/AnglesYPR'
          required:
            - type
            - referenceFrame
            - position
            - angles
        - type: object
          title: Relative Pose Quaternion
          description: 'Relative-Quaternion: Relative pose using quaternion to specify orientation'
          properties:
            type:
              const: RelativePose
            referenceFrame:
              type: string
              format: uri
            position:
              $ref: '#/components/schemas/PositionXYZ'
            quaternion:
              $ref: '#/components/schemas/Quaternion'
          required:
            - type
            - referenceFrame
            - position
            - quaternion
      $defs:
        PositionGeo:
          description: Geographic position in EPSG:4979 CRS (WGS84)
          properties:
            lat:
              type: number
            lon:
              type: number
            h:
              type: number
          required:
            - lat
            - lon
            - h
        PositionXYZ:
          description: Cartesian position expressed in the specified reference frame
          properties:
            x:
              description: Distance along the X axis, in meters
              type: number
            'y':
              description: Distance along the Y axis, in meters
              type: number
            z:
              description: Distance along the Z axis, in meters
              type: number
          required:
            - x
            - 'y'
            - z
        AnglesYPR:
          description: Euler angles, with yaw, pitch and roll rotations about the local (rotated) axes Z, Y, and X respectively, applied in that order
          properties:
            yaw:
              description: Yaw angle about Z axis, in degrees
              type: number
            pitch:
              description: Pitch angle about Y axis, in degrees
              type: number
            roll:
              description: Roll angle about X axis, in degrees
              type: number
          required:
            - yaw
            - pitch
            - roll
        Quaternion:
          description: Quaternion orientation expressed in the specified reference frame
          properties:
            x:
              type: number
            'y':
              type: number
            z:
              type: number
            w:
              type: number
          required:
            - x
            - 'y'
            - z
            - w
    SpatialFrame:
      description: A general spatial Cartesian Reference Frame where the axes and origin will be defined textually relative to a physical component.
      type: object
      allOf:
        - $ref: '#/components/schemas/AbstractSweIdentifiable'
        - properties:
            origin:
              description: A textual description of the origin of the reference frame relative to the physical device (e.g., "the origin is at the point of attachment of the sensor to the platform").
              type: string
            axes:
              description: Axis with name attribute and a textual description of the relationship of the axis to the physical device; the order of the axes listed determines their relationship according to the right-handed rule (e.g., axis 1 cross axis 2 = axis 3).
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  description:
                    type: string
                required:
                  - name
                  - description
          required:
            - origin
            - axes
      unevaluatedProperties: false
    TemporalFrame:
      description: A general temporal frame such as a mission start time or timer start time. The origin should just describe context of the start of time (e.g., start of local timer).
      type: object
      allOf:
        - $ref: '#/components/schemas/AbstractSweIdentifiable'
        - properties:
            origin:
              type: string
          required:
            - origin
      unevaluatedProperties: false
    Position:
      oneOf:
        - title: by Text
          description: A textual description of where the system is located (e.g., a building name, a room number, etc.)
          $ref: '#/components/schemas/Text'
        - title: by Point
          $ref: '#/components/schemas/Point'
        - title: by Pose
          $ref: '#/components/schemas/Pose'
        - title: by Process
          $ref: '#/components/schemas/AbstractProcess'
        - title: by Datastream
          $ref: '#/components/schemas/link'
        - title: by Location Vector
          deprecated: true
          $ref: '#/components/schemas/Vector'
        - title: by Position (DataRecord)
          deprecated: true
          $ref: '#/components/schemas/DataRecord'
        - title: by Trajectory (DataArray)
          deprecated: true
          $ref: '#/components/schemas/DataArray'
    AbstractPhysicalProcess:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      allOf:
        - $ref: '#/components/schemas/AbstractProcess'
        - properties:
            attachedTo:
              description: References the physical component or system (e.g., platform) to which to which this component or system is attached.
              $ref: '#/components/schemas/link'
            localReferenceFrames:
              description: A list of spatial reference frames, attached to the physical component itself.
              type: array
              items:
                $ref: '#/components/schemas/SpatialFrame'
            localTimeFrames:
              description: Supports local time reference frames such as "time past mission start". Note that units are handled in timePosition so they are not specified in the TemporalFrame.
              type: array
              items:
                $ref: '#/components/schemas/TemporalFrame'
            position:
              description: Provides positional information relating the component's spatial reference frame to an external spatial reference frame.
              $ref: '#/components/schemas/Position'
      $defs:
        SpatialFrame:
          description: A general spatial Cartesian Reference Frame where the axes and origin will be defined textually relative to a physical component.
          type: object
          allOf:
            - $ref: '#/components/schemas/AbstractSweIdentifiable'
            - properties:
                origin:
                  description: A textual description of the origin of the reference frame relative to the physical device (e.g., "the origin is at the point of attachment of the sensor to the platform").
                  type: string
                axes:
                  description: Axis with name attribute and a textual description of the relationship of the axis to the physical device; the order of the axes listed determines their relationship according to the right-handed rule (e.g., axis 1 cross axis 2 = axis 3).
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      description:
                        type: string
                    required:
                      - name
                      - description
              required:
                - origin
                - axes
          unevaluatedProperties: false
        TemporalFrame:
          description: A general temporal frame such as a mission start time or timer start time. The origin should just describe context of the start of time (e.g., start of local timer).
          type: object
          allOf:
            - $ref: '#/components/schemas/AbstractSweIdentifiable'
            - properties:
                origin:
                  type: string
              required:
                - origin
          unevaluatedProperties: false
        Position:
          oneOf:
            - title: by Text
              description: A textual description of where the system is located (e.g., a building name, a room number, etc.)
              $ref: '#/components/schemas/Text'
            - title: by Point
              $ref: '#/components/schemas/Point'
            - title: by Pose
              $ref: '#/components/schemas/Pose'
            - title: by Process
              $ref: '#/components/schemas/AbstractProcess'
            - title: by Datastream
              $ref: '#/components/schemas/link'
            - title: by Location Vector
              deprecated: true
              $ref: '#/components/schemas/Vector'
            - title: by Position (DataRecord)
              deprecated: true
              $ref: '#/components/schemas/DataRecord'
            - title: by Trajectory (DataArray)
              deprecated: true
              $ref: '#/components/schemas/DataArray'
    PhysicalComponent:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      allOf:
        - $ref: '#/components/schemas/AbstractPhysicalProcess'
        - properties:
            type:
              const: PhysicalComponent
            method:
              $ref: '#/components/schemas/ProcessMethod'
    ComponentList:
      type: array
      minItems: 1
      items:
        allOf:
          - $ref: '#/components/schemas/SoftNamedProperty'
          - oneOf:
              - $ref: '#/components/schemas/SimpleProcess'
              - $ref: '#/components/schemas/AggregateProcess'
              - $ref: '#/components/schemas/PhysicalComponent'
              - $ref: '#/components/schemas/PhysicalSystem'
              - $ref: '#/components/schemas/link'
                properties:
                  type:
                    const: Link
    ConnectionList:
      type: array
      minItems: 1
      items:
        type: object
        properties:
          source:
            $ref: '#/components/schemas/PathRef'
