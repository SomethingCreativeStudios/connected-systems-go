    commandSchemaSwe:
      $schema: https://json-schema.org/draft/2020-12/schema
      type: object
      properties:
        commandFormat:
          type: string
        recordSchema:
          $ref: '#/components/schemas/AnyComponent'
        encoding: {}
      required:
        - commandFormat
        - recordSchema
        - encoding
      oneOf:
        - title: SWE JSON
          properties:
            commandFormat:
              const: application/swe+json
            encoding:
              $ref: '#/components/schemas/JSONEncoding'
        - title: SWE Text
